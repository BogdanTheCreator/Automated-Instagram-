# Weekly faceless-YouTube "Video Pack" — runs on GitHub's servers, free.
#
# WHAT IT DOES (every Monday morning):
#   1. Scans the niche and writes a ranked opportunity report (10 story topics).
#   2. Generates a complete, production-ready Video Pack for the top topic:
#      title options, full 8-12 min narration script, SEO upload pack (description,
#      tags, chapters, pinned comment), thumbnail concepts and promotion ideas.
#   3. Synthesizes the narration to MP3 (free edge-tts, or ElevenLabs if a key is
#      set) — per-beat clips plus a combined narration.mp3 in the pack's audio/ folder.
#   4. Uploads everything as a downloadable artifact you review before producing.
#
# This needs no API keys and uses few CI minutes. Nothing is published, so you
# stay in control of the final thumbnail, video assembly and upload (supervised
# automation).
#
# OPTIONAL SECRET (GitHub -> Settings -> Secrets and variables -> Actions):
#   OPENAI_API_KEY  -> writes the topic ideas + full narration with an LLM.
#                      Without it you still get a complete, editable beat-sheet
#                      scaffold for free.
# OPTIONAL VARIABLE:
#   BRAND  -> defaults to betrayal_revenge (the niche this channel is built for).

name: Weekly Video Pack

on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Niche brand key"
        default: "betrayal_revenge"
      topic:
        description: "Optional: force a specific topic (leave blank to auto-pick the week's best)"
        default: ""
  schedule:
    # 08:00 UTC every Monday. Edit the time/day to change the cadence.
    - cron: "0 8 * * 1"

permissions:
  contents: read

concurrency:
  group: weekly-videopack
  cancel-in-progress: false

jobs:
  videopack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install voiceover + audio tools (free, no API key)
        run: |
          # edge-tts gives free neural voices; ffmpeg merges the per-beat clips
          # into a single narration.mp3. Both are optional — the pack is still
          # produced without them.
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install -q edge-tts

      - name: Generate the weekly opportunity report + Video Pack (with voiceover)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          BRAND="${{ github.event.inputs.brand }}"
          [ -z "$BRAND" ] && BRAND="${{ vars.BRAND }}"
          [ -z "$BRAND" ] && BRAND="betrayal_revenge"
          TOPIC="${{ github.event.inputs.topic }}"
          echo "Using brand: $BRAND"
          if [ -n "$TOPIC" ]; then
            echo "Forcing topic: $TOPIC"
            python -m social.cli "$TOPIC" --brand "$BRAND" --long --voiceover --out weekly_out
          else
            python -m social.cli --weekly --brand "$BRAND" --voiceover --out weekly_out
          fi

      - name: Print a quick summary to the run log
        if: always()
        run: |
          echo "## Weekly Video Pack" >> "$GITHUB_STEP_SUMMARY"
          if [ -f weekly_out/opportunities.md ]; then
            echo "### Opportunity report" >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,40p' weekly_out/opportunities.md >> "$GITHUB_STEP_SUMMARY"
          fi
          PACK="$(find weekly_out -name VIDEO_PACK.md | head -1)"
          if [ -n "$PACK" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### This week's Video Pack (preview)" >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,30p' "$PACK" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload the weekly bundle as a downloadable artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-video-pack
          path: weekly_out/**
          if-no-files-found: warn
